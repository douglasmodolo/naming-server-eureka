name: Microservices Continuous Deployment with Github Actions

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'adopt'

    - name: Build Eureka Naming Server JAR
      run: mvn spring-boot:build-image -DskipTests

    - name: Build Eureka Naming Server Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/naming-server:${{ github.sha }} .
        docker tag ${{ secrets.DOCKER_USERNAME }}/naming-server:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/naming-server:latest

    - name: Push Eureka Naming Server Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/naming-server:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/naming-server:latest        
